<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>切削参数计算器 - CCCNC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/enhanced.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0071e3;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --bg: #ffffff;
            --bg-secondary: #f5f5f7;
            --border: #d2d2d7;
        }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            color: var(--text); 
            background: var(--bg);
        }
        .container { max-width: 1024px; margin: 0 auto; padding: 0 22px; }
        
        /* Navigation */
        .nav-wrapper {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 9999;
            background: rgba(251, 251, 253, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .nav {
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-logo { font-size: 21px; font-weight: 700; color: var(--text); text-decoration: none; }
        .nav-links { display: flex; gap: 36px; align-items: center; }
        .nav-links a { font-size: 12px; color: var(--text); text-decoration: none; opacity: 0.8; }
        .nav-links a:hover { opacity: 1; }
        
        /* Page Header */
        .page-header {
            padding: 120px 0 60px;
            text-align: center;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg) 100%);
        }
        .page-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .page-desc {
            font-size: 18px;
            color: var(--text-secondary);
        }
        
        /* Calculator Section */
        .calculator-section {
            padding: 60px 0;
        }
        .calculator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        
        /* Input Panel */
        .input-panel {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 40px;
        }
        .panel-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            background: var(--bg);
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0,113,227,0.1);
        }
        .calculate-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,113,227,0.3);
        }
        
        /* Results Panel */
        .results-panel {
            background: var(--bg);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid var(--border);
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
        }
        .result-label {
            font-size: 15px;
            color: var(--text-secondary);
        }
        .result-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }
        .result-unit {
            font-size: 14px;
            color: var(--text-secondary);
            margin-left: 4px;
        }
        
        /* Material Presets */
        .presets-section {
            padding: 40px 0 80px;
        }
        .presets-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }
        .presets-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .preset-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .preset-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.1);
        }
        .preset-card.active {
            background: var(--primary);
            color: white;
        }
        .preset-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }
        .preset-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .preset-range {
            font-size: 12px;
            opacity: 0.8;
        }
        
        @media (max-width: 768px) {
            .calculator-grid { grid-template-columns: 1fr; }
            .presets-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="nav-wrapper">
        <div class="container">
            <nav class="nav">
                <a href="/" class="nav-logo">CCCNC</a>
                <div class="nav-links">
                    <a href="/">首页</a>
                    <a href="/products/endmills.html">铣刀</a>
                    <a href="/products/drills.html">钻头</a>
                    <a href="/products/taps.html">丝锥</a>
                    <a href="/search.html">搜索</a>
                    <a href="/contact.html">联系</a>
                </div>
            </nav>
        </div>
    </div>

    <header class="page-header">
        <div class="container">
            <h1 class="page-title">切削参数计算器</h1>
            <p class="page-desc">根据刀具和材料快速计算最佳切削参数</p>
        </div>
    </header>

    <section class="calculator-section">
        <div class="container">
            <div class="calculator-grid">
                <div class="input-panel">
                    <h2 class="panel-title">输入参数</h2>
                    <div class="form-group">
                        <label>刀具类型</label>
                        <select id="toolType">
                            <option value="endmill">立铣刀</option>
                            <option value="drill">钻头</option>
                            <option value="tap">丝锥</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>刀具直径 (mm)</label>
                        <input type="number" id="toolDiameter" value="10" min="0.1" max="100" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>刃数</label>
                        <input type="number" id="flutes" value="4" min="1" max="12" step="1">
                    </div>
                    <div class="form-group">
                        <label>加工材料</label>
                        <select id="material">
                            <option value="steel">碳钢 / 合金钢</option>
                            <option value="stainless">不锈钢</option>
                            <option value="aluminum">铝合金</option>
                            <option value="titanium">钛合金</option>
                            <option value="castiron">铸铁</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>切削深度 (mm)</label>
                        <input type="number" id="cutDepth" value="5" min="0.1" max="50" step="0.1">
                    </div>
                    <button class="calculate-btn" onclick="calculate()">计算参数</button>
                </div>
                
                <div class="results-panel">
                    <h2 class="panel-title">计算结果</h2>
                    <div class="result-item">
                        <span class="result-label">切削速度 (Vc)</span>
                        <div>
                            <span class="result-value" id="cuttingSpeed">-</span>
                            <span class="result-unit">m/min</span>
                        </div>
                    </div>
                    <div class="result-item">
                        <span class="result-label">主轴转速 (n)</span>
                        <div>
                            <span class="result-value" id="spindleSpeed">-</span>
                            <span class="result-unit">rpm</span>
                        </div>
                    </div>
                    <div class="result-item">
                        <span class="result-label">每齿进给 (fz)</span>
                        <div>
                            <span class="result-value" id="feedPerTooth">-</span>
                            <span class="result-unit">mm/z</span>
                        </div>
                    </div>
                    <div class="result-item">
                        <span class="result-label">进给速度 (Vf)</span>
                        <div>
                            <span class="result-value" id="feedRate">-</span>
                            <span class="result-unit">mm/min</span>
                        </div>
                    </div>
                    <div class="result-item">
                        <span class="result-label">金属去除率 (Q)</span>
                        <div>
                            <span class="result-value" id="mrr">-</span>
                            <span class="result-unit">cm³/min</span>
                        </div>
                    </div>
                    <div class="result-item">
                        <span class="result-label">加工功率 (P)</span>
                        <div>
                            <span class="result-value" id="power">-</span>
                            <span class="result-unit">kW</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="presets-section">
        <div class="container">
            <h2 class="presets-title">材料预设</h2>
            <div class="presets-grid">
                <div class="preset-card" onclick="selectMaterial('steel')">
                    <div class="preset-icon">🔩</div>
                    <div class="preset-name">碳钢</div>
                    <div class="preset-range">Vc: 80-150</div>
                </div>
                <div class="preset-card" onclick="selectMaterial('stainless')">
                    <div class="preset-icon">🛡️</div>
                    <div class="preset-name">不锈钢</div>
                    <div class="preset-range">Vc: 50-100</div>
                </div>
                <div class="preset-card" onclick="selectMaterial('aluminum')">
                    <div class="preset-icon">✈️</div>
                    <div class="preset-name">铝合金</div>
                    <div class="preset-range">Vc: 200-400</div>
                </div>
                <div class="preset-card" onclick="selectMaterial('titanium')">
                    <div class="preset-icon">🔧</div>
                    <div class="preset-name">钛合金</div>
                    <div class="preset-range">Vc: 30-60</div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Material cutting parameters database
        const materialData = {
            steel: { vc: 120, fz: 0.12, kc: 1800 },
            stainless: { vc: 80, fz: 0.1, kc: 2200 },
            aluminum: { vc: 300, fz: 0.15, kc: 800 },
            titanium: { vc: 45, fz: 0.08, kc: 2500 },
            castiron: { vc: 100, fz: 0.14, kc: 1200 }
        };

        function calculate() {
            const diameter = parseFloat(document.getElementById('toolDiameter').value);
            const flutes = parseInt(document.getElementById('flutes').value);
            const material = document.getElementById('material').value;
            const cutDepth = parseFloat(document.getElementById('cutDepth').value);
            
            const params = materialData[material];
            
            // Cutting speed (m/min)
            const vc = params.vc;
            
            // Spindle speed (rpm)
            const n = Math.round((vc * 1000) / (Math.PI * diameter));
            
            // Feed per tooth (mm/z)
            const fz = params.fz;
            
            // Feed rate (mm/min)
            const vf = Math.round(n * fz * flutes);
            
            // Material removal rate (cm³/min)
            const ae = diameter * 0.5; // Radial depth of cut (50% of diameter)
            const mrr = Math.round((ae * cutDepth * vf) / 1000 * 100) / 100;
            
            // Power (kW)
            const power = Math.round((mrr * params.kc) / (60 * 1000 * 0.8) * 100) / 100;
            
            // Update results
            document.getElementById('cuttingSpeed').textContent = vc;
            document.getElementById('spindleSpeed').textContent = n.toLocaleString();
            document.getElementById('feedPerTooth').textContent = fz;
            document.getElementById('feedRate').textContent = vf.toLocaleString();
            document.getElementById('mrr').textContent = mrr;
            document.getElementById('power').textContent = power;
        }

        function selectMaterial(material) {
            document.getElementById('material').value = material;
            document.querySelectorAll('.preset-card').forEach(card => card.classList.remove('active'));
            event.currentTarget.classList.add('active');
            calculate();
        }

        // Calculate on page load
        calculate();
    </script>
</body>
</html>
